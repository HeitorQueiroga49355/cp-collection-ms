# ═══════════════════════════════════════════════════════════════════════════════
#  cp-collection-ms — compose STANDALONE para desenvolvimento isolado do MS
#
#  Use este arquivo quando quiser trabalhar só no MS, sem subir o stack completo.
#  Para subir o sistema inteiro:
#    cd ../Coleta-Premiada && docker compose up
#
#  Portas escolhidas para não conflitar com o stack consolidado:
#    MongoDB  → 27019 (stack usa 27018, nativo usa 27017)
#    RabbitMQ → 5673 / 15673 (stack usa 5672 / 15672)
#    MS API   → 8002 (mesma porta — sobe um ou outro, não os dois juntos)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  ms-db:
    image: mongo:7.0
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-coleta_db}
    ports:
      - "27019:27017"
    volumes:
      - ms-db-data:/data/db
    networks:
      - ms-local-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq-local:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - ms-local-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms:
    build:
      context: .
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: "27017"
      RABBITMQ_HOST: rabbitmq-local
    command: python manage.py runserver 0.0.0.0:8001
    ports:
      - "8002:8001"
    depends_on:
      ms-db:
        condition: service_healthy
      rabbitmq-local:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      ms-local-network: {}
      coleta-observability:
        aliases:
          - ms-dev

  # Backup automático do MongoDB: mongodump diário (03h) comprimido com gzip,
  # retendo os últimos 7 backups em /backups/mongo. Ver mongo-backup/ e o
  # README (seção "Backup e restauração do MongoDB") para detalhes e restore.
  mongo-backup:
    build:
      context: ./mongo-backup
    container_name: coleta-mongo-backup
    restart: unless-stopped
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_INITDB_DATABASE:-coleta_db}
      BACKUP_DIR: /backups/mongo
      BACKUP_RETENTION: ${BACKUP_RETENTION:-7}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 3 * * *}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BACKUP_BUCKET: ${MINIO_BACKUP_BUCKET:-mongo-backups}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
    depends_on:
      ms-db:
        condition: service_healthy
    volumes:
      - mongo_backups:/backups/mongo
    networks:
      ms-local-network: {}

  ms-consumer:
    build:
      context: .
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: "27017"
      RABBITMQ_HOST: rabbitmq
    command: python manage.py consumir_imoveis
    depends_on:
      ms-db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      ms-local-network: {}
      coleta-observability: {}

  # Manutencao automatizada do MongoDB:
  # - cleanup: diario as 03:15 (remove dados antigos)
  # - indices: semanal aos domingos as 04:00 (analise/rebuild)
  mongo-maintenance:
    image: mongo:7.0
    env_file: .env
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: "27017"
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_INITDB_DATABASE:-coleta_db}
      MONGO_AUTH_DB: admin
      MONGO_RETENTION_DAYS: ${MONGO_RETENTION_DAYS:-90}
      MONGO_CLEANUP_BATCH: ${MONGO_CLEANUP_BATCH:-5000}
      MONGO_CLEANUP_COLLECTIONS: ${MONGO_CLEANUP_COLLECTIONS:-audit_logs}
    volumes:
      - ./scripts/maintenance:/maintenance:ro
    command: sh /maintenance/mongo_cron.sh
    depends_on:
      ms-db:
        condition: service_healthy
    networks:
      - ms-local-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    restart: unless-stopped
    environment:
      MONGODB_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@ms-db:27017/?authSource=admin"
    command:
      - --collector.dbstats
      - --collector.replicasetstatus
      - --collector.diagnosticdata
      - --collector.collstats-colls=coleta_db.audit_logs
    depends_on:
      ms-db:
        condition: service_healthy
    networks:
      ms-local-network: {}
      coleta-observability:
        aliases:
          - mongodb-exporter
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

volumes:
  ms-db-data:
  mongo_backups:
    driver: local

networks:
  ms-local-network:
    driver: bridge
  coleta-observability:
    external: true
    name: coleta-observability

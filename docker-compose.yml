# ═══════════════════════════════════════════════════════════════════════════════
#  cp-collection-ms — compose STANDALONE para desenvolvimento isolado do MS
#
#  Use este arquivo quando quiser trabalhar só no MS, sem subir o stack completo.
#  Para subir o sistema inteiro:
#    cd ../Coleta-Premiada && docker compose up
#
#  Portas escolhidas para não conflitar com o stack consolidado:
#    MongoDB  → 27019 (stack usa 27018, nativo usa 27017)
#    RabbitMQ → 5673 / 15673 (stack usa 5672 / 15672)
#    MS API   → 8002 (mesma porta — sobe um ou outro, não os dois juntos)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  ms-db:
    image: mongo:7.0
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27019:27017"
    volumes:
      - ms-db-data:/data/db
    networks:
      - ms-local-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - ms-local-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms:
    build:
      context: .
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: "27017"
      RABBITMQ_HOST: rabbitmq
    command: python manage.py runserver 0.0.0.0:8001
    ports:
      - "8002:8001"
    depends_on:
      ms-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ms-local-network

  ms-consumer:
    build:
      context: .
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: ms-db
      MONGO_PORT: "27017"
      RABBITMQ_HOST: rabbitmq
    command: python manage.py consumir_imoveis
    depends_on:
      ms-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ms-local-network

volumes:
  ms-db-data:

networks:
  ms-local-network:
    driver: bridge

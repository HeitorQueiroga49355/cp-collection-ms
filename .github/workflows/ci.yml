name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  check-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup env
        run: cp .env.example .env

      - name: Install project
        run: make ci-up

      - name: Check Django
        run: make check

      - name: Check migrations
        run: make migrations-check

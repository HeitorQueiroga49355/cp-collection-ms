services:
  # MongoDB - Banco de dados do microsserviço de coletas
  mongodb:
    image: mongo:7.0
    container_name: coleta-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: coleta_user
      MONGO_INITDB_ROOT_PASSWORD: senha123
      MONGO_INITDB_DATABASE: coleta_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - coleta-ms-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Microsserviço de coletas (Django)
  app:
    build:
      context: .
      target: development
    container_name: coleta-ms-app
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: mongodb
      RABBITMQ_HOST: rabbitmq   # container do Coleta-Premiada via rede compartilhada
    ports:
      - "8002:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - coleta-ms-network
      - coleta-shared  # acessa o rabbitmq do Coleta-Premiada

  # Consumer da fila 'imoveis' (publicada pelo Coleta-Premiada Core)
  coleta-ms-consumer:
    build:
      context: .
      target: development
    container_name: coleta-ms-consumer
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: mongodb
      RABBITMQ_HOST: rabbitmq
    command: python manage.py consumir_imoveis
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - coleta-ms-network
      - coleta-shared

volumes:
  mongodb_data:
    driver: local

networks:
  coleta-ms-network:
    driver: bridge
  coleta-shared:
    # Rede criada pelo docker-compose do Coleta-Premiada; aqui só anexamos.
    external: true
    name: coleta-shared
